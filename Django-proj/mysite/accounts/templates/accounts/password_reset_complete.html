{% extends 'base.html' %}

{% block title %}Пароль изменён - Django Блог{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm text-center">
                <div class="card-body p-5">
                    <i class="bi bi-check-circle display-1 text-success mb-3"></i>
                    <h4>Пароль успешно изменён</h4>
                    <p class="text-muted">Ваш пароль установлен. Теперь вы можете войти с новым паролем.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
