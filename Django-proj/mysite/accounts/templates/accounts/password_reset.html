{% extends 'base.html' %}

{% block title %}Сброс пароля - Django Блог{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0"><i class="bi bi-key me-2"></i>Сброс пароля</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">Введите ваш email, и мы отправим инструкции по сбросу пароля.</p>
                    <form method="post" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email</label>
                            <input type="email" name="email" id="id_email" class="form-control" placeholder="your@email.com" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-send me-2"></i>Отправить ссылку
                            </button>
                        </div>
                    </form>
                    <div class="text-center mt-3">
                        <a href="{% url 'accounts:login' %}" class="text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i>Назад ко входу
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
