<div class="card mb-4 shadow-sm">
    <div class="card-header bg-info text-white">
        <i class="bi bi-clock-history me-2"></i>Последние записи
    </div>
    <div class="list-group list-group-flush">
        {% for post in latest_posts %}
        <a href="{{ post.get_absolute_url }}" class="list-group-item list-group-item-action">
            <div class="d-flex w-100 justify-content-between">
                <h6 class="mb-1 text-truncate" style="max-width: 200px;">{{ post.title }}</h6>
            </div>
            <small class="text-muted">
                <i class="bi bi-person me-1"></i>{{ post.author.username }}
                <span class="mx-1">|</span>
                <i class="bi bi-calendar3 me-1"></i>{{ post.publish|date:"d M" }}
            </small>
        </a>
        {% empty %}
        <div class="list-group-item text-muted">Записей пока нет.</div>
        {% endfor %}
    </div>
</div>
