{% load blog_tags %}

<!-- Поиск -->
<div class="card mb-4 shadow-sm">
    <div class="card-header bg-primary text-white">
        <i class="bi bi-search me-2"></i>Поиск
    </div>
    <div class="card-body">
        <form action="{% url 'blog:post_search' %}" method="get">
            <div class="input-group">
                <input type="text" class="form-control" name="q" placeholder="Поиск записей..." value="{{ request.GET.q }}">
                <button class="btn btn-primary" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Статистика -->
<div class="card mb-4 shadow-sm">
    <div class="card-header bg-success text-white">
        <i class="bi bi-bar-chart me-2"></i>Статистика
    </div>
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
            <span><i class="bi bi-journal-text me-2"></i>Всего записей</span>
            <span class="badge bg-primary fs-6">{% total_posts %}</span>
        </div>
    </div>
</div>

<!-- Последние записи -->
{% show_latest_posts 5 %}

<!-- Облако тегов -->
{% show_tag_cloud %}
