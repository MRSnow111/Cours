{% extends 'base.html' %}

{% block title %}Удалить запись - Django Блог{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Удалить запись</h4>
                </div>
                <div class="card-body p-4 text-center">
                    <i class="bi bi-trash display-1 text-danger mb-3"></i>
                    <h5>Вы уверены, что хотите удалить эту запись?</h5>
                    <p class="text-muted">«<strong>{{ post.title }}</strong>»</p>
                    <p class="text-muted">Это действие нельзя отменить.</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash me-2"></i>Да, удалить
                            </button>
                            <a href="{{ post.get_absolute_url }}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-2"></i>Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
